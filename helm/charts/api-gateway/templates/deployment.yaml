apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gw.fullname" . }}
  labels:
    app: {{ include "gw.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "gw.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "gw.name" . }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "gw.name" . }}
          image: "{{ .Values.global.image.repository }}:gateway-{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}